name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Test (pytest, SQLite + mock Spotify)
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///:memory:
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Test (vitest)
        working-directory: frontend
        run: npx vitest run
      - name: Build
        working-directory: frontend
        run: npm run build
